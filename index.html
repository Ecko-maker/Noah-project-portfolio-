<!DOCTYPE html>
<html>

<head>

<title>Robot Delivery Tracker</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map {
height: 100vh;
}
</style>

</head>

<body>

<div id="map"></div>

<script>

var map = L.map('map').setView([42.3598,-71.0921],16);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

var robotMarker;

function updateRobot(){

fetch('../data/robot_position.geojson')
.then(response => response.json())
.then(data => {

var coords = data.features[0].geometry.coordinates;

var lat = coords[1];
var lon = coords[0];

if(robotMarker){
robotMarker.setLatLng([lat,lon])
}
else{
robotMarker = L.marker([lat,lon]).addTo(map)
.bindPopup("Delivery Robot")
}

});
}

updateRobot()

setInterval(updateRobot,10000)

</script>

</body>
</html>
